<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Balls</title>
<style>
  :root{
    --bg:#FBFBFD; --ink:#1D1D1F; --ink-2:#86868B; --hair:#EBEBF0;
    --card:#FFFFFF; --tray:#F5F5F7; --blue:#0071E3;
    --s:#D8A52E; --s-ink:#3A2A00;
    --a:#45B16B; --a-ink:#FFFFFF;
    --b:#95C23E; --b-ink:#2C3A05;
    --c:#F3CC42; --c-ink:#463700;
    --d:#EC8A33; --d-ink:#FFFFFF;
    --f:#E14B3C; --f-ink:#FFFFFF;
    --ease:cubic-bezier(.22,.61,.36,1);
    --canH:clamp(62px,9.2vh,112px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI","Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility; height:100vh; overflow:hidden;
  }
  .wrap{max-width:none;width:100%;height:100vh;margin:0 auto;padding:clamp(14px,2.4vh,24px) clamp(16px,2.5vw,36px);
    display:flex;flex-direction:column;}

  header{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;
    flex:0 0 auto;margin-bottom:clamp(10px,1.8vh,18px);}
  .brand{display:flex;align-items:center;gap:14px;min-width:0;}
  .mark{width:42px;height:42px;flex:0 0 auto;}
  #title{font-size:clamp(26px,4vw,42px);font-weight:600;letter-spacing:-.022em;line-height:1;margin:0;outline:none;border-radius:8px;}
  #title:focus{box-shadow:0 0 0 4px rgba(0,113,227,.18);}
  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .btn{font-family:inherit;font-size:14px;font-weight:500;letter-spacing:-.01em;border:none;border-radius:980px;
    cursor:pointer;padding:9px 16px;color:var(--ink);background:transparent;
    transition:background .25s var(--ease),transform .15s var(--ease);display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{background:rgba(0,0,0,.05);}
  .btn:active{transform:scale(.97);}
  .btn.primary{background:var(--ink);color:#fff;}
  .btn.primary:hover{background:#000;}
  .btn svg{width:16px;height:16px;}

  .board{background:var(--card);border:1px solid var(--hair);border-radius:20px;overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,.04),0 12px 40px rgba(0,0,0,.05);
    flex:1 1 auto;min-height:0;display:flex;flex-direction:column;}
  .tier{display:flex;align-items:stretch;gap:12px;padding:8px 12px;border-bottom:1px solid var(--hair);
    flex:1 1 0;min-height:0;}
  .tier:last-child{border-bottom:none;}
  .tile{flex:0 0 auto;width:clamp(46px,5vh,64px);aspect-ratio:1;align-self:center;border-radius:16px;
    display:flex;align-items:center;justify-content:center;font-size:clamp(24px,3.2vh,34px);font-weight:600;
    letter-spacing:-.03em;user-select:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);}
  .tier[data-tier="S"] .tile{background:var(--s);color:var(--s-ink);}
  .tier[data-tier="A"] .tile{background:var(--a);color:var(--a-ink);}
  .tier[data-tier="B"] .tile{background:var(--b);color:var(--b-ink);}
  .tier[data-tier="C"] .tile{background:var(--c);color:var(--c-ink);}
  .tier[data-tier="D"] .tile{background:var(--d);color:var(--d-ink);}
  .tier[data-tier="F"] .tile{background:var(--f);color:var(--f-ink);}
  .items{flex:1 1 auto;align-self:stretch;display:flex;flex-wrap:nowrap;align-items:center;
    gap:10px;min-width:0;overflow-x:auto;overflow-y:hidden;border-radius:12px;
    transition:background .2s var(--ease);scrollbar-width:thin;}
  .items.hot{background:rgba(0,113,227,.07);}

  .tray-wrap{flex:0 0 auto;margin-top:clamp(8px,1.6vh,16px);}
  .tray-label{font-size:13px;font-weight:500;color:var(--ink-2);letter-spacing:-.01em;margin:0 4px 8px;
    display:flex;justify-content:space-between;align-items:baseline;}
  .tray{background:var(--tray);border-radius:18px;padding:14px 22px;display:flex;flex-wrap:nowrap;
    align-items:flex-end;overflow-x:auto;overflow-y:hidden;transition:background .2s var(--ease);
    scrollbar-width:thin;}
  .tray.hot{background:#E9EAF0;}

  .chip{position:relative;display:inline-flex;align-items:flex-end;justify-content:center;cursor:grab;
    padding:4px;flex:0 0 auto;transition:transform .18s var(--ease);}
  .chip img{height:var(--canH);width:auto;display:block;pointer-events:none;user-select:none;
    filter:drop-shadow(0 4px 9px rgba(0,0,0,.24));transition:filter .18s var(--ease);}
  /* Bottom tray: fan the cans into one row, in order, with a light
     overlap so each can stays easy to see and grab. */
  .tray .chip{margin-left:clamp(-20px,-0.8vw,-6px);}
  .tray .chip:first-child{margin-left:0;}
  .chip:hover{transform:translateY(-10px);z-index:20;}
  .chip:hover img{filter:drop-shadow(0 12px 20px rgba(0,0,0,.32));}
  .chip.dragging{opacity:.4;cursor:grabbing;z-index:30;}
  .chip .del{position:absolute;top:0;right:0;width:22px;height:22px;border:none;border-radius:50%;
    background:rgba(0,0,0,.6);color:#fff;font-size:14px;line-height:1;cursor:pointer;padding:0;
    display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .chip:hover .del{display:flex;}
  .chip .del:hover{background:rgba(0,0,0,.85);}

  body.clean .toolbar,body.clean .chip .del,body.clean .tray-label .count{display:none;}
  #fab{position:fixed;bottom:22px;right:22px;z-index:40;width:46px;height:46px;border-radius:50%;
    border:1px solid var(--hair);background:#fff;color:var(--ink);box-shadow:0 6px 20px rgba(0,0,0,.14);
    cursor:pointer;display:none;align-items:center;justify-content:center;}
  body.clean #fab{display:flex;}
  #fab svg{width:20px;height:20px;}

  @media (max-width:560px){
    :root{--canH:clamp(48px,7vh,72px);}
    .tier{gap:8px;padding:6px 8px;}
    .tray .chip{margin-left:-16px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <svg class="mark" viewBox="0 0 40 40" aria-hidden="true">
        <circle cx="20" cy="20" r="18" fill="#C9DE4B"/>
        <path d="M7 9 C15 16 15 24 7 31" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <path d="M33 9 C25 16 25 24 33 31" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h1 id="title" contenteditable="true" spellcheck="false">Tennis Balls</h1>
    </div>
    <div class="toolbar">
      <button class="btn" id="resetBtn">Reset</button>
      <button class="btn" id="cleanBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
        Record
      </button>
    </div>
  </header>

  <div class="board" id="board">
    <div class="tier" data-tier="S"><div class="tile">S</div><div class="items"></div></div>
    <div class="tier" data-tier="A"><div class="tile">A</div><div class="items"></div></div>
    <div class="tier" data-tier="B"><div class="tile">B</div><div class="items"></div></div>
    <div class="tier" data-tier="C"><div class="tile">C</div><div class="items"></div></div>
    <div class="tier" data-tier="D"><div class="tile">D</div><div class="items"></div></div>
    <div class="tier" data-tier="F"><div class="tile">F</div><div class="items"></div></div>
  </div>

  <div class="tray-wrap">
    <p class="tray-label"><span>Unranked</span><span class="count" id="count"></span></p>
    <div class="tray" id="tray"></div>
  </div>
</div>

<button id="fab" title="Exit recording mode" aria-label="Exit recording mode">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><path d="M3 3l18 18"/></svg>
</button>

<script>
const CANS = [
  "tennis%20ball%20pics/1.png",
  "tennis%20ball%20pics/2.png",
  "tennis%20ball%20pics/3.png",
  "tennis%20ball%20pics/4.png",
  "tennis%20ball%20pics/5.png",
  "tennis%20ball%20pics/6.png",
  "tennis%20ball%20pics/7.png",
  "tennis%20ball%20pics/24.png",
  "tennis%20ball%20pics/8.png",
  "tennis%20ball%20pics/9.png",
  "tennis%20ball%20pics/10.png",
  "tennis%20ball%20pics/11.png",
  "tennis%20ball%20pics/12.png",
  "tennis%20ball%20pics/13.png",
  "tennis%20ball%20pics/14.png",
  "tennis%20ball%20pics/15.png",
  "tennis%20ball%20pics/16.png",
  "tennis%20ball%20pics/17.png",
  "tennis%20ball%20pics/18.png",
  "tennis%20ball%20pics/19.png",
  "tennis%20ball%20pics/20.png",
  "tennis%20ball%20pics/21.png",
  "tennis%20ball%20pics/22.png",
  "tennis%20ball%20pics/23.png"
];
(function(){
  "use strict";
  const tray=document.getElementById('tray');
  const zones=[...document.querySelectorAll('.items'),tray];
  let dragged=null;
  function makeChip(src){
    const chip=document.createElement('div'); chip.className='chip'; chip.draggable=true;
    const img=document.createElement('img'); img.src=src; img.draggable=false; img.alt='';
    const del=document.createElement('button'); del.className='del'; del.type='button'; del.textContent='\u00D7';
    del.title='Remove'; del.addEventListener('click',e=>{e.stopPropagation();chip.remove();refresh();});
    chip.append(img,del);
    chip.addEventListener('dragstart',()=>{dragged=chip;setTimeout(()=>chip.classList.add('dragging'),0);});
    chip.addEventListener('dragend',()=>{chip.classList.remove('dragging');dragged=null;clearHot();refresh();});
    return chip;
  }
  function afterElement(zone,x,y){
    const chips=[...zone.querySelectorAll('.chip:not(.dragging)')];
    let best={d:Infinity,el:null};
    for(const c of chips){const r=c.getBoundingClientRect();
      const dx=x-(r.left+r.width/2),dy=Math.abs(y-(r.top+r.height/2)),d=dy*2+Math.abs(dx);
      if(dx<0&&d<best.d)best={d,el:c};}
    return best.el;
  }
  function clearHot(){zones.forEach(z=>z.classList.remove('hot'));}
  zones.forEach(zone=>{
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('hot');if(!dragged)return;
      const ref=afterElement(zone,e.clientX,e.clientY);if(ref)zone.insertBefore(dragged,ref);else zone.appendChild(dragged);});
    zone.addEventListener('dragleave',e=>{if(!zone.contains(e.relatedTarget))zone.classList.remove('hot');});
    zone.addEventListener('drop',e=>{e.preventDefault();clearHot();refresh();});
  });
  function refresh(){const n=tray.querySelectorAll('.chip').length;document.getElementById('count').textContent=n?n+' left':'';}
  document.getElementById('resetBtn').addEventListener('click',()=>{
    document.querySelectorAll('.items .chip').forEach(c=>tray.appendChild(c));refresh();});
  document.getElementById('cleanBtn').addEventListener('click',()=>document.body.classList.add('clean'));
  document.getElementById('fab').addEventListener('click',()=>document.body.classList.remove('clean'));
  CANS.forEach(src=>tray.appendChild(makeChip(src)));
  refresh();
})();
</script>
</body>
</html>
